name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/test_types.py tests/test_fixture_factory.py tests/test_state_store.py tests/test_scoring.py tests/test_judge.py tests/test_episode_scorer.py tests/test_morning_brief.py -v

      - name: Run conformance tests
        run: |
          pytest tests/test_conformance.py -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sandbox image
        run: |
          docker build -f docker/Dockerfile.sandbox -t ghcr.io/trajectoryrl/trajrl-bench:test .

      - name: Build hermes image
        run: |
          docker build -f docker/Dockerfile.hermes -t ghcr.io/trajectoryrl/hermes-agent:test .

      - name: Verify sandbox CLI
        run: |
          docker run --rm --entrypoint python ghcr.io/trajectoryrl/trajrl-bench:test \
            -m trajrl_bench.cli scenarios

      - name: Verify hermes SSH
        run: |
          docker run --rm --entrypoint ssh ghcr.io/trajectoryrl/hermes-agent:test -V

  # Publish on main push: latest + sha tags
  docker-publish:
    needs: [test, docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.sandbox
          push: true
          tags: |
            ghcr.io/trajectoryrl/trajrl-bench:latest
            ghcr.io/trajectoryrl/trajrl-bench:${{ github.sha }}

      - name: Build and push hermes image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.hermes
          push: true
          tags: |
            ghcr.io/trajectoryrl/hermes-agent:latest
            ghcr.io/trajectoryrl/hermes-agent:${{ github.sha }}

  # Publish on tag push: versioned tags (v1.0.0 → :v1, :v1.0, :v1.0.0)
  docker-release:
    needs: [test, docker-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # v1.0.0 → major=v1, minor=v1.0, patch=v1.0.0
          MAJOR=$(echo $TAG | cut -d. -f1)
          MINOR=$(echo $TAG | cut -d. -f1-2)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image (versioned)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.sandbox
          push: true
          tags: |
            ghcr.io/trajectoryrl/trajrl-bench:latest
            ghcr.io/trajectoryrl/trajrl-bench:${{ steps.version.outputs.tag }}
            ghcr.io/trajectoryrl/trajrl-bench:${{ steps.version.outputs.minor }}
            ghcr.io/trajectoryrl/trajrl-bench:${{ steps.version.outputs.major }}

      - name: Build and push hermes image (versioned)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.hermes
          push: true
          tags: |
            ghcr.io/trajectoryrl/hermes-agent:latest
            ghcr.io/trajectoryrl/hermes-agent:${{ steps.version.outputs.tag }}
            ghcr.io/trajectoryrl/hermes-agent:${{ steps.version.outputs.minor }}
            ghcr.io/trajectoryrl/hermes-agent:${{ steps.version.outputs.major }}
